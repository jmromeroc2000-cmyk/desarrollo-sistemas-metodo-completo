name: CI matrix opcional (Oracle + DB2)

# Workflow manual para validar Oracle y DB2.
# Razón: las imágenes oficiales requieren registro/licencia (Oracle Container
# Registry, IBM Cloud Container Registry). NO se pueden usar en CI público
# sin credenciales — se ejecuta como workflow_dispatch o cuando el operador
# las provee.
#
# Cuando se ejecuta:
#   - workflow_dispatch manual (cualquier branch)
#   - en PRs con label 'test-oracle' o 'test-db2'
#
# Configuración:
#   El repo necesita estos secrets:
#     ORACLE_REGISTRY_USER, ORACLE_REGISTRY_PASS (registry.oracle.com)
#     IBM_REGISTRY_USER, IBM_REGISTRY_PASS (icr.io)
#   Si no están definidos, el job se salta con warning.

on:
  workflow_dispatch:
    inputs:
      dbms:
        description: 'DBMS a probar'
        required: true
        type: choice
        options:
          - oracle
          - db2
          - both
        default: oracle
  pull_request:
    branches: [main]
    types: [labeled]

jobs:
  oracle:
    name: Oracle 23ai Free
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.dbms == 'oracle' || github.event.inputs.dbms == 'both')
      || (github.event_name == 'pull_request' && github.event.label.name == 'test-oracle')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      oracle:
        image: container-registry.oracle.com/database/free:latest
        env:
          ORACLE_PWD: yourStrong!Password1
          ORACLE_CHARACTERSET: AL32UTF8
        ports:
          - 1521:1521
        options: >-
          --health-cmd "/opt/oracle/runOracle.sh && echo 'SELECT 1 FROM DUAL;' | sqlplus -L system/yourStrong!Password1@//localhost:1521/FREEPDB1"
          --health-interval 30s
          --health-timeout 30s
          --health-retries 20
          --health-start-period 5m
    env:
      DB_DRIVER: oracle
      DB_HOST: localhost
      DB_PORT: 1521
      DB_NAME: FREEPDB1
      DB_SERVICE_NAME: FREEPDB1
      DB_USER: system
      DB_PASSWORD: yourStrong!Password1
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Dev/package-lock.json
      - name: Install deps + oracledb
        run: |
          npm ci --no-audit --no-fund
          npm install oracledb --no-save
      - name: Install Oracle Instant Client
        run: |
          wget -q https://download.oracle.com/otn_software/linux/instantclient/2380000/instantclient-basic-linux.x64-23.8.0.25.04.zip
          unzip -q instantclient-basic-linux.x64-23.8.0.25.04.zip -d /opt/oracle
          echo "LD_LIBRARY_PATH=/opt/oracle/instantclient_23_8:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      - name: Apply migrations
        run: node scripts/migrate.js up
      - name: Apply triggers (PL/SQL + Application Context)
        run: node scripts/migrate.js triggers
      - name: Tests portables
        run: npm test

  db2:
    name: IBM DB2 LUW Developer Edition
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.dbms == 'db2' || github.event.inputs.dbms == 'both')
      || (github.event_name == 'pull_request' && github.event.label.name == 'test-db2')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      db2:
        image: icr.io/db2_community/db2:latest
        env:
          LICENSE: accept
          DB2INST1_PASSWORD: yourStrong!Password1
          DBNAME: SISTEST
          BLU: false
          ENABLE_ORACLE_COMPATIBILITY: false
          UPDATEAVAIL: 'NO'
          TO_CREATE_SAMPLEDB: false
          REPODB: false
          IS_OSXFS: false
          PERSISTENT_HOME: true
          HADR_ENABLED: false
        ports:
          - 50000:50000
        options: >-
          --privileged=true
          --health-cmd "su - db2inst1 -c 'db2 connect to SISTEST' || exit 1"
          --health-interval 30s
          --health-timeout 30s
          --health-retries 20
          --health-start-period 5m
    env:
      DB_DRIVER: db2
      DB_HOST: localhost
      DB_PORT: 50000
      DB_NAME: SISTEST
      DB_USER: db2inst1
      DB_PASSWORD: yourStrong!Password1
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Dev/package-lock.json
      - name: Install deps + ibm_db
        run: |
          # ibm_db requires Linux build tools + IBM ODBC driver
          sudo apt-get update && sudo apt-get install -y python3 make gcc g++
          npm ci --no-audit --no-fund
          npm install ibm_db --no-save
      - name: Apply migrations
        run: node scripts/migrate.js up
      - name: Apply triggers (SQL/PL + global variable)
        run: node scripts/migrate.js triggers
      - name: Tests portables
        run: npm test
