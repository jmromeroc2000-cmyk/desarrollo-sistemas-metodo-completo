name: npm audit (weekly)

on:
  schedule:
    # Cada lunes 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        scope: [backend, frontend]
        include:
          - scope: backend
            workdir: Dev
          - scope: frontend
            workdir: Dev/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.workdir }}/package-lock.json
      - name: Install deps
        working-directory: ${{ matrix.workdir }}
        run: npm ci --no-audit --no-fund
      - name: Audit (high+critical)
        working-directory: ${{ matrix.workdir }}
        # Warning, not failure: queremos visibilidad sin bloquear
        # mantenimiento. Convertir a `--audit-level=critical` y exit-code
        # cuando el equipo esté listo para enforcement.
        run: |
          npm audit --audit-level=high || echo "::warning::vulns detected — review"
      - name: Generar issue si hay vulns críticas
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `npm audit critical — ${context.workflow} ${new Date().toISOString().slice(0,10)}`,
              body: `Vulnerabilidades críticas detectadas en \`${{ matrix.workdir }}\`. Ver run: ${context.runId}`,
              labels: ['security', 'dependencies']
            });
