name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt-in al runtime Node.js 24 para actions JavaScript-based.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 0: detección de paths cambiados
  # Cada job de abajo se condiciona contra esta salida.
  # ─────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Dev/src/**'
              - 'Dev/migrations/**'
              - 'Dev/tests/**'
              - 'Dev/package*.json'
              - 'Dev/scripts/**'
            frontend:
              - 'Dev/frontend/**'
            migrations:
              - 'Dev/migrations/**'

  # ─────────────────────────────────────────────────────────────────
  # Backend tests
  # ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (tests)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sistema_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U testuser -d sistema_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      NODE_ENV: test
      SYSTEM_MODE: DEBUG
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sistema_test
      DB_USER: testuser
      DB_PASSWORD: testpassword
      REDIS_URL: redis://localhost:6379
      LOG_LEVEL: error
      JWT_PRIVATE_KEY_PATH: ./keys/private.key
      JWT_PUBLIC_KEY_PATH: ./keys/public.key
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Dev/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Generate JWT keys
        run: npm run generate-keys
      - name: Apply migrations
        run: npm run migrate
      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────
  # Migrations clean apply — aislado del job backend
  # Fresh DB → npm run migrate. Si falla aquí, falla en producción.
  # ─────────────────────────────────────────────────────────────────
  migrations-clean-apply:
    name: Migrations (clean apply)
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sistema_clean
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U testuser -d sistema_clean"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sistema_clean
      DB_USER: testuser
      DB_PASSWORD: testpassword
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Dev/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Apply all migrations from scratch
        run: npm run migrate
      - name: Verify metadata_versiones row count matches migration count
        run: |
          MIG_COUNT=$(ls migrations/*.sql | wc -l)
          DB_COUNT=$(PGPASSWORD=testpassword psql -h localhost -U testuser sistema_clean -tAc "SELECT COUNT(*) FROM metadata_versiones")
          echo "Migrations on disk: $MIG_COUNT"
          echo "metadata_versiones rows: $DB_COUNT"
          # No es estricto: no todas las migs bumpean versión, pero
          # debe haber al menos una versión registrada.
          if [ "$DB_COUNT" -lt "1" ]; then
            echo "ERROR: metadata_versiones está vacía"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (typecheck + lint + preflight + tests)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: Dev/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Dev/frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Preflight
        run: npm run preflight
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────
  # E2E — solo si tocó backend O frontend (cualquiera puede romper)
  # ─────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright chromium)
    needs: changes
    if: |
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') &&
      !contains(github.event.head_commit.message, '[skip e2e]') &&
      !contains(github.event.pull_request.title, '[skip e2e]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sistema_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U testuser -d sistema_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      SYSTEM_MODE: DEBUG
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: sistema_test
      DB_USER: testuser
      DB_PASSWORD: testpassword
      LOG_LEVEL: error
      PORT: 3001
      JWT_PRIVATE_KEY_PATH: ./keys/private.key
      JWT_PUBLIC_KEY_PATH: ./keys/public.key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            Dev/package-lock.json
            Dev/frontend/package-lock.json
      - name: Install backend deps
        working-directory: Dev
        run: npm ci --no-audit --no-fund
      - name: Install frontend deps
        working-directory: Dev/frontend
        run: npm ci --no-audit --no-fund
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Dev/frontend/package-lock.json') }}
      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: Dev/frontend
        run: npx playwright install --with-deps chromium
      - name: Generate JWT keys
        working-directory: Dev
        run: npm run generate-keys
      - name: Apply migrations
        working-directory: Dev
        run: npm run migrate
      - name: Seed dev admin
        working-directory: Dev
        run: npm run seed:dev
      - name: Start backend (background)
        working-directory: Dev
        run: nohup npm start > /tmp/backend.log 2>&1 &
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3001/health > /dev/null && exit 0
            sleep 1
          done
          echo "Backend never came up. Logs:"
          cat /tmp/backend.log
          exit 1
      - name: Build frontend
        working-directory: Dev/frontend
        run: npm run build
      - name: Run Playwright
        working-directory: Dev/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5174
          VITE_API_URL: http://localhost:3001
        run: npm run test:e2e -- --project=chromium
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Dev/frontend/playwright-report/
          retention-days: 7
      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log
          retention-days: 7
